<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOC // C2</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0e12; }
      #root { width: 100vw; height: 100vh; }
      * { box-sizing: border-box; user-select: none; }
      body { font-family: Consolas, 'Courier New', monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- CUTOVER: the game now runs on the TypeScript sim (src-new).
         The old JS app remains at /src/main.jsx as the rollback path. -->

    <!-- migration harness: only fetched when opened with ?golden -->
    <script type="module">
      if (new URLSearchParams(location.search).has('golden')) import('/src-new/devtools/entry.ts')
    </script>
  </body>
</html>
